services:
  putzplan-reminder:
    build: .
    env_file:
      - .env
    # Jeden Sonntag um 19:00 ausfuehren via Ofelia (oder externen Cron)
    # Fuer einmaligen Testlauf:
    #   docker compose run --rm putzplan-reminder
    # Dry-Run:
    #   docker compose run --rm putzplan-reminder --dry-run

  # Optionaler Cron-Scheduler - laeuft dauerhaft und triggert woechentlich
  scheduler:
    image: mcuadros/ofelia:latest
    depends_on:
      - putzplan-reminder
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      ofelia.job-run.putzplan.schedule: "0 19 * * 0"
      ofelia.job-run.putzplan.container: "putzplan-reminder"
    profiles:
      - cron
